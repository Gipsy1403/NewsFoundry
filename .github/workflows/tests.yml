name: Backend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Variables d'environnement partagées entre les steps
    env:
      PYTHONPATH: backend
      DATABASE_URL: sqlite:///test.db
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # 2.1 Mets les paquets pip en cache afin d'accélerer l'intégration continue
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 3. Installer les dépendances (requirements + outils de test)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov

      # 4. Lancer les tests depuis le dossier `backend`
      - name: Run tests
        working-directory: backend
        run: |
          pytest -v tests

      - name: Show bcrypt & passlib versions
        run: |
          python -m pip show bcrypt || true
          python -m pip show passlib || true